name: BQ Ingest

on:
  schedule:
    - cron: '5 1 * * *' 
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r statistics/requirements.txt

      - name: Run bq_ingest
        env:
          BQ_CREDENTIALS_JSON: ${{ secrets.BQ_CREDENTIALS_JSON }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: python statistics/bq_ingest.py
