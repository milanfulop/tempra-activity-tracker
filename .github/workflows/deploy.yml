name: Flutter Web Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - name: Recreate .env file
        run: |
          mkdir -p assets
          echo "HOST_ADDRESS=${{ secrets.HOST_ADDRESS }}" > assets/.env
          echo "AUTH_TOKEN=${{ secrets.AUTH_TOKEN }}" >> assets/.env
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> assets/.env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> assets/.env
          echo "GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}" >> assets/.env

      - run: flutter pub get
      
      - name: Build Flutter Web
        run: flutter build web --release

      - name: Configure Netlify Redirects
        run: echo "/* /index.html 200" > build/web/_redirects

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v2.0
        with:
          publish-dir: ./app/build/web 
          production-branch: main
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          enable-commit-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
