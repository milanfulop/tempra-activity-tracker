name: Sync Dataform subfolder to mirror repo

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'dataform/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout mirror repo
        uses: actions/checkout@v4
        with:
          repository: milanfulop/activity-tracker-dataform-mirror
          token: ${{ secrets.DATAFORM_MIRROR_TOKEN }}
          path: mirror

      - name: Sync subfolder contents to mirror root
        run: |
          rsync -av --delete \
            --exclude='.git' \
            source/dataform/ mirror/

      - name: Commit and push if changed
        working-directory: mirror
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to sync"
          else
            git commit -m "Sync from activity-tracker @ ${{ github.sha }}"
            git push
          fi
